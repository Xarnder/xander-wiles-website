<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LFM2.5 Image Prompt Generator</title>

    <!-- Theme-aware SVG icons (modern browsers) -->
    <link rel="icon" href="favicon.ico" sizes="any"> <!-- Fallback for older browsers -->
    <link rel="icon" href="favicon-light.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">

    <!-- Fallback PNG icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <!-- Other essential links -->
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111115" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lfm-page.css">
</head>

<body>
    <div id="main-nav-placeholder"></div>
    <script src="/assets/js/nav-loader.js"></script>

    <main class="app-shell">
        <section class="hero-card">
            <p class="eyebrow">Local browser AI · WebGPU · ONNX</p>
            <h1>LFM2.5 Image Prompt Generator</h1>
            <p class="subtitle">
                Upload a photo and generate a descriptive text-to-image style prompt from it.
            </p>

            <div id="supportBox" class="support-box">
                Checking browser support…
            </div>
        </section>

        <section class="workspace-card">
            <div class="upload-panel">
                <label class="upload-drop" for="imageInput">
                    <input id="imageInput" type="file" accept="image/*" />
                    <span class="upload-icon">＋</span>
                    <strong>Upload photo</strong>
                    <small>JPG, PNG, WEBP. On mobile, you can choose camera or gallery.</small>
                </label>

                <img id="previewImage" class="preview-image" alt="Uploaded preview" hidden />

                <button id="generateBtn" disabled>
                    Generate image prompt
                </button>

                <button id="copyBtn" disabled>
                    Copy prompt
                </button>
            </div>

            <div class="output-panel">
                <div class="status-row">
                    <span id="statusDot" class="status-dot"></span>
                    <span id="statusText">Upload an image to begin.</span>
                </div>

                <label for="promptOutput">Generated prompt</label>
                <textarea id="promptOutput" readonly
                    placeholder="Your generated image prompt will appear here…"></textarea>

                <details>
                    <summary>Debug / notes</summary>
                    <pre id="debugLog"></pre>
                </details>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>

</html>
