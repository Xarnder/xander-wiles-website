<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Version Comparator</title>
    <!-- Theme-aware SVG icons (modern browsers) -->
    <link rel="icon" href="/favicon.ico" sizes="any"> <!-- Fallback for older browsers -->
    <link rel="icon" href="/favicon-light.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">

    <!-- Fallback PNG icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

    <!-- Other essential links -->
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111115" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">

    <link rel="stylesheet" href="app.css">
</head>

<body>
    <div class="bg-atmosphere">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    
    <div id="main-nav-placeholder"></div>

    <main class="container">
        <div id="toolbar" class="toolbar hidden">
            <button id="resetBtn" class="secondary-btn danger" title="Clear documents and start over">
                Reset
            </button>

            <button id="colorModeBtn" class="secondary-btn" title="Switch to colorblind-friendly palette">
                <img src="eye-icon.svg" class="btn-icon" alt=""> Colorblind Mode
            </button>
            
            <div class="zoom-controls">
                <label for="zoomSlider">Zoom</label>
                <input type="range" id="zoomSlider" min="0.5" max="2.5" step="0.1" value="1.5">
                <span id="zoomVal">1.5x</span>
            </div>

            <div class="nav-group">
                <button id="prevChangeBtn" class="secondary-btn" title="Previous Change">
                    <img src="angle-circle-arrow-right-icon.svg" class="btn-icon rotate-180" alt="">
                </button>
                <button id="nextChangeBtn" class="secondary-btn" title="Next Change">
                    <img src="angle-circle-arrow-right-icon.svg" class="btn-icon" alt="">
                </button>
            </div>
            <span id="changeCount" class="change-info"></span>
        </div>

        <header class="app-header">
            <h1>PDF Comparator</h1>
            <p>Upload two PDFs to detect sentence-level matches and differences, regardless of order.</p>
        </header>

        <section id="uploadSection" class="upload-section glass-card">
            <div class="file-drop-area" id="drop-zone-1">
                <label for="pdf1" class="upload-label">
                    <span class="upload-title">Original PDF</span>
                    <span class="upload-subtitle">Drag & drop or click to browse</span>
                    <input type="file" id="pdf1" accept="application/pdf" class="file-input">
                    <span class="file-name-display" id="name-1">No file selected</span>
                </label>
            </div>
            <div class="file-drop-area" id="drop-zone-2">
                <label for="pdf2" class="upload-label">
                    <span class="upload-title">Modified PDF</span>
                    <span class="upload-subtitle">Drag & drop or click to browse</span>
                    <input type="file" id="pdf2" accept="application/pdf" class="file-input">
                    <span class="file-name-display" id="name-2">No file selected</span>
                </label>
            </div>
        </section>

        <div class="action-section">
            <button id="compareBtn" class="primary-btn">Compare Documents</button>
            <div id="loading" class="hidden">Processing PDFs...</div>
        </div>

        <section id="results-container" class="results-grid hidden">
            <div class="result-card glass-card">
                <div class="card-header">
                    <h2 id="fileName1">Document 1</h2>
                    <div class="legend">
                        <span class="badge match">Matched</span>
                        <span class="badge missing">Missing in Doc 2</span>
                    </div>
                </div>
                <div id="viewer1" class="pdf-viewer"></div>
            </div>

            <div class="result-card glass-card">
                <div class="card-header">
                    <h2 id="fileName2">Document 2</h2>
                    <div class="legend">
                        <span class="badge match">Matched</span>
                        <span class="badge new">New in Doc 2</span>
                    </div>
                </div>
                <div id="viewer2" class="pdf-viewer"></div>
            </div>
        </section>
    </main>

    <script src="/assets/js/nav-loader.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script src="app.js"></script>
</body>

</html>
