<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML/ASP to PDF Converter</title>

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="favicon-light.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#111115" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="/assets/css/style.css">

    <link rel="stylesheet" href="page-style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div id="main-nav-placeholder"></div>

    <main class="converter-container">
        <div class="glass-card">
            <h1>File to PDF Converter</h1>
            <p class="subtitle">Select an .asp.html or .html file to convert.</p>

            <div class="input-group">
                <input type="file" id="fileInput" accept=".html, .htm, .asp, .asp.html" class="file-input">
            </div>

            <button id="convertBtn" class="primary-btn">Convert to PDF</button>

            <div id="statusMessage" class="status-message"></div>

            <div class="privacy-note">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <span>100% Local & Private: Your files never leave your device.</span>
            </div>
        </div>
    </main>

    <script src="/assets/js/nav-loader.js"></script>

    <script src="script.js"></script>
</body>

</html>
