<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/pages/Group-Availability/">
  <title>Signing in — Group Availability</title>
  <meta name="theme-color" content="#eef4ff">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('wth-theme');
        document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/calendar.css">
</head>
<body>
  <div class="container">
    <p class="loading-screen">Signing you in…</p>
  </div>
  <script type="module" src="js/auth-callback.js"></script>
</body>
</html>
